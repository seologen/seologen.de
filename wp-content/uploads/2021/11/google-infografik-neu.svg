<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <rect width="700" height="300" rx="16" fill="#05282c"/>

  <!-- Left: Bars -->
  <text x="36" y="38" font-family="Raleway,sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="0.5">Google Rankings</text>

  <rect x="36" y="60" width="300" height="30" rx="6" fill="#e83a7e"/>
  <rect x="36" y="100" width="175" height="30" rx="6" fill="#e83a7e" opacity="0.6"/>
  <rect x="36" y="140" width="120" height="30" rx="6" fill="#e83a7e" opacity="0.4"/>
  <rect x="36" y="180" width="50" height="30" rx="6" fill="#e83a7e" opacity="0.2"/>
  <rect x="36" y="220" width="12" height="30" rx="4" fill="#1a3a3a"/>

  <text x="348" y="81" font-family="Raleway,sans-serif" font-size="14" fill="#e83a7e" font-weight="700">#1</text>
  <text x="220" y="121" font-family="Raleway,sans-serif" font-size="14" fill="#e83a7e" font-weight="600" opacity="0.7">#2</text>
  <text x="164" y="161" font-family="Raleway,sans-serif" font-size="14" fill="#e83a7e" font-weight="600" opacity="0.5">#3</text>
  <text x="94" y="201" font-family="Raleway,sans-serif" font-size="12" fill="#4a6a6a">#4-10</text>
  <text x="56" y="241" font-family="Raleway,sans-serif" font-size="12" fill="#3a5a5a">#10+</text>

  <!-- Divider -->
  <line x1="410" y1="28" x2="410" y2="272" stroke="#1a3a3a" stroke-width="1"/>

  <!-- Right: KI Platforms -->
  <text x="440" y="38" font-family="Raleway,sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="0.5">KI-Suche</text>

  <rect x="440" y="60" width="220" height="50" rx="25" fill="none" stroke="#e83a7e" stroke-width="2"/>
  <text x="550" y="92" font-family="Raleway,sans-serif" font-size="18" fill="#e83a7e" font-weight="700" text-anchor="middle">ChatGPT</text>

  <rect x="440" y="125" width="220" height="50" rx="25" fill="none" stroke="#e83a7e" stroke-width="1.5" opacity="0.6"/>
  <text x="550" y="157" font-family="Raleway,sans-serif" font-size="18" fill="#e83a7e" font-weight="700" text-anchor="middle" opacity="0.7">Perplexity</text>

  <rect x="440" y="190" width="220" height="50" rx="25" fill="none" stroke="#e83a7e" stroke-width="1.2" opacity="0.4"/>
  <text x="550" y="222" font-family="Raleway,sans-serif" font-size="18" fill="#e83a7e" font-weight="700" text-anchor="middle" opacity="0.5">Gemini</text>
